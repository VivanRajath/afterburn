spec_version: "0.1.0"
name: afterburn
version: "0.1.0"
description: >
  Post-mortem to pre-mortem intelligence. Ingests incident post-mortems,
  builds a causal knowledge graph, and surfaces historical warnings on
  pull requests that touch the same failure patterns.
author: afterburn contributors
license: MIT
model:
  preferred: "groq:llama-3.3-70b-versatile"
  fallback:
    - "anthropic:claude-sonnet-4-5-20250929"
    - "openai:gpt-4o"
skills:
  - ingest-incident
  - extract-ontology
  - reconcile-graph
  - distill-lesson
  - check-pr
  - self-review
  - export-memory
  - batch-ingest
  - ask
tools:
  - memory-backend
  - memory-cognis
  - memory-filesystem
  - memory-sqlite
  - memory-s3
  - ontology-extractor
  - graph-query
  - github-client
  - sandbox-runner
  - file-read
  - file-write
agents:
  ingestor:
    description: Fetches raw post-mortem text from local files or GitHub sources and persists it to the memory backend.
  extractor:
    description: Runs ontology extraction on raw incident text and returns typed graph nodes and edges.
  cartographer:
    description: Merges extractor output into the causal graph, enforces deduplication, and evaluates pattern promotion rules.
  oracle:
    description: Inspects PR diffs, queries the causal graph, and routes to the appropriate tier sub-agent.
  jnr-oracle:
    description: Handles zero-incident PRs with a silent pass.
  snr-oracle:
    description: Handles PRs with 1-2 past incidents or hot-zone hits, posting a single-lesson warning.
  architect-oracle:
    description: Handles PRs with recurring or band-aid patterns, posting a full multi-hop causal chain analysis.
  scribe:
    description: Distills causal subgraph traversals into concise, searchable lessons for the memory backend.
  self-reviewer:
    description: Audits past PR warnings against engineer outcomes and updates lesson confidence weights.
runtime:
  max_turns: 30
  timeout: 300
tags:
  - incident-management
  - code-review
  - developer-tools
