name: file-write
version: "0.1.0"
description: >
  Write or append to files on the local filesystem. Scope is narrow by
  design — only agents with explicit write permissions in DUTIES.md may
  invoke this tool for their declared target paths. Supports write
  (create/overwrite), append (add to existing), and write_json (atomic
  JSON write via write-then-rename).
input_schema:
  type: object
  properties:
    operation:
      type: string
      description: "write, append, or write_json"
    path:
      type: string
      description: Target file path.
    content:
      type: string
      description: Content to write or append (for write and append operations).
    data:
      type: object
      description: Object to serialize as JSON (for write_json operation).
    pretty:
      type: boolean
      description: Pretty-print JSON output for write_json. Default true.
  required:
    - operation
    - path
output_schema:
  type: object
  properties:
    success:
      type: boolean
    bytes_written:
      type: integer
