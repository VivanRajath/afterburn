name: sandbox-runner
version: "0.1.0"
description: >
  Execute read-only commands against a repository in an isolated,
  resource-limited sandbox. Network and filesystem writes are disabled.
  Used by the self-reviewer to replay past PR checks. Operations: run
  (execute a read-only shell command), check_command (validate before
  execution). Max runtime 30s, max output 64KB.
input_schema:
  type: object
  properties:
    operation:
      type: string
      description: "run or check_command"
    command:
      type: string
      description: Shell command to run or validate. Must be read-only.
    working_dir:
      type: string
      description: Directory within the sandbox to run from. Defaults to repo root.
    timeout_seconds:
      type: integer
      description: Per-command timeout in seconds. Capped at 30.
  required:
    - operation
    - command
output_schema:
  type: object
  properties:
    stdout:
      type: string
    stderr:
      type: string
    exit_code:
      type: integer
    truncated:
      type: boolean
    allowed:
      type: boolean
    reason:
      type: string
