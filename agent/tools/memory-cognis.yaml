name: memory-cognis
version: "0.1.0"
description: >
  Cognis adapter for the memory-backend interface. Default and recommended
  backend — provides semantic search via the Lyzr Cognis platform. Requires
  LYZR_API_KEY and COGNIS_OWNER_ID env vars. Install with:
  npx skills add Lyzr-Cognis/cognis-skills. Skills and sub-agents never
  reference this adapter directly — all calls go through memory-backend.
input_schema:
  type: object
  properties:
    operation:
      type: string
      description: "save_incident, save_lesson, search, get, or list — mirrors memory-backend interface"
    id:
      type: string
      description: Record identifier.
    raw_text:
      type: string
      description: Raw incident text for save_incident.
    distilled_text:
      type: string
      description: Distilled lesson text for save_lesson.
    metadata:
      type: object
      description: Metadata object for save operations.
    tags:
      type: object
      description: Tags array for save_lesson.
    query:
      type: string
      description: Search query string.
    scope:
      type: string
      description: "incidents, lessons, or all"
    limit:
      type: integer
      description: Max results.
    cursor:
      type: string
      description: Pagination cursor for list.
  required:
    - operation
output_schema:
  type: object
  properties:
    stored_id:
      type: string
    backend:
      type: string
    results:
      type: object
    record:
      type: object
    records:
      type: object
    next_cursor:
      type: string
