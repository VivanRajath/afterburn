name: ontology-extractor
version: "0.1.0"
description: >
  Extracts typed entities and directed relationships from raw incident text.
  Used by the extractor sub-agent to populate staging output before the
  cartographer merges it into the causal graph. Output types are strictly
  constrained to knowledge/schema/nodes.yaml and knowledge/schema/edges.yaml.
input_schema:
  type: object
  properties:
    operation:
      type: string
      description: "extract — run ontology extraction on incident text"
    incident_id:
      type: string
      description: Unique incident identifier.
    raw_text:
      type: string
      description: Full unmodified post-mortem text.
    focus_types:
      type: object
      description: >
        Array of node types to extract. Defaults to all types if omitted:
        Service, Error, Trigger, RootCause, Symptom, Mitigation, CodePath.
  required:
    - operation
    - incident_id
    - raw_text
output_schema:
  type: object
  properties:
    nodes:
      type: object
    edges:
      type: object
    extraction_id:
      type: string
implementation:
  type: script
  path: scripts/ontology-extractor.mjs
  runtime: node
