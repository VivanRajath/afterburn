name: github-client
version: "0.1.0"
description: >
  Read PR diffs and post review comments on GitHub. afterburn is
  comment-only — this tool deliberately omits approve, request-changes,
  merge, and close operations. Requires GITHUB_TOKEN with
  pull_requests:write and contents:read scopes. Operations: get_pr_diff,
  post_comment (body must cite [INC-XXXX] or [LES-XXXX]), get_file_history.
input_schema:
  type: object
  properties:
    operation:
      type: string
      description: "get_pr_diff, post_comment, or get_file_history"
    repo:
      type: string
      description: "Owner/repo format (e.g. acme/api-server)."
    pr_number:
      type: integer
      description: Pull request number.
    body:
      type: string
      description: Markdown comment body for post_comment. Must cite an incident or lesson ID.
    file_path:
      type: string
      description: File path to fetch history for (get_file_history).
    limit:
      type: integer
      description: Maximum commits to return for get_file_history. Default 20.
  required:
    - operation
    - repo
output_schema:
  type: object
  properties:
    changed_files:
      type: object
    patches:
      type: object
    comment_url:
      type: string
    comment_id:
      type: integer
    commits:
      type: object
implementation:
  type: script
  path: scripts/github-client.mjs
  runtime: node
