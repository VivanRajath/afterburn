name: memory-s3
version: "0.1.0"
description: >
  S3 adapter for the memory-backend interface. Enterprise blob storage —
  stores incidents and lessons as JSON objects in an S3-compatible bucket.
  Search uses a local keyword index cached from S3 (refreshed after each
  write). Supports MinIO, Cloudflare R2, and any S3-compatible endpoint via
  AFTERBURN_S3_ENDPOINT. Requires AFTERBURN_S3_BUCKET, AFTERBURN_S3_REGION,
  AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY. Skills and sub-agents never
  reference this adapter directly.
input_schema:
  type: object
  properties:
    operation:
      type: string
      description: "save_incident, save_lesson, search, get, or list — mirrors memory-backend interface"
    id:
      type: string
      description: Record identifier.
    raw_text:
      type: string
      description: Raw incident text for save_incident.
    distilled_text:
      type: string
      description: Distilled lesson text for save_lesson.
    metadata:
      type: object
      description: Metadata object for save operations.
    tags:
      type: object
      description: Tags array for save_lesson.
    query:
      type: string
      description: Keyword search query against cached index.
    scope:
      type: string
      description: "incidents, lessons, or all"
    limit:
      type: integer
      description: Max results.
    cursor:
      type: string
      description: Pagination cursor (S3 ListObjectsV2 ContinuationToken).
  required:
    - operation
output_schema:
  type: object
  properties:
    stored_id:
      type: string
    backend:
      type: string
    results:
      type: object
    record:
      type: object
    records:
      type: object
    next_cursor:
      type: string
