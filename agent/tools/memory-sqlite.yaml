name: memory-sqlite
version: "0.1.0"
description: >
  SQLite adapter for the memory-backend interface. Self-hosted, single-file
  database with FTS5 full-text search — no external dependencies. Suitable
  for self-hosted small-to-medium teams who want structured queries without
  a managed service. Configure with AFTERBURN_SQLITE_PATH (default:
  memory/afterburn.db). Skills and sub-agents never reference this adapter
  directly.
input_schema:
  type: object
  properties:
    operation:
      type: string
      description: "save_incident, save_lesson, search, get, or list — mirrors memory-backend interface"
    id:
      type: string
      description: Record identifier.
    raw_text:
      type: string
      description: Raw incident text for save_incident.
    distilled_text:
      type: string
      description: Distilled lesson text for save_lesson.
    metadata:
      type: object
      description: Metadata object for save operations.
    tags:
      type: object
      description: Tags array for save_lesson.
    query:
      type: string
      description: FTS5 search query.
    scope:
      type: string
      description: "incidents, lessons, or all"
    limit:
      type: integer
      description: Max results.
    cursor:
      type: string
      description: Pagination cursor (last rowid of previous batch).
  required:
    - operation
output_schema:
  type: object
  properties:
    stored_id:
      type: string
    backend:
      type: string
    results:
      type: object
    record:
      type: object
    records:
      type: object
    next_cursor:
      type: string
