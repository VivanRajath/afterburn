name: graph-query
version: "0.1.0"
description: >
  Read-only query interface for knowledge/incident-graph.json. Used by
  oracle-family agents to find historical patterns relevant to a PR diff.
  Never writes to the graph — all mutations go through the cartographer.
  Operations: incidents_touching_files, multi_hop, pattern_match.
input_schema:
  type: object
  properties:
    operation:
      type: string
      description: "incidents_touching_files, multi_hop, or pattern_match"
    files:
      type: object
      description: Array of file paths for incidents_touching_files.
    seed_id:
      type: string
      description: Starting node ID for multi_hop traversal.
    max_hops:
      type: integer
      description: Maximum hops for multi_hop. Default 3.
    edge_types:
      type: object
      description: Array of edge types to follow for multi_hop. Omit for all edges.
    pattern_type:
      type: string
      description: "Pattern type for pattern_match: hot-zone, recurring, or band-aid"
    file_path:
      type: string
      description: Scope pattern_match to patterns referencing this file. Omit for global.
  required:
    - operation
output_schema:
  type: object
  properties:
    incidents:
      type: object
    hot_zones:
      type: object
    patterns:
      type: object
    paths:
      type: object
    nodes:
      type: object
    matches:
      type: object
implementation:
  type: script
  path: scripts/graph-query.mjs
  runtime: node
