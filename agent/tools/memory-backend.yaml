name: memory-backend
version: "0.1.0"
description: >
  Memory backend interface contract. Every memory operation in afterburn
  goes through this tool — skills and sub-agents never call an adapter
  directly. The active adapter is selected at runtime via the
  AFTERBURN_MEMORY_BACKEND env var (cognis | filesystem | sqlite | s3).
  Operations: save_incident, save_lesson, search, get, list.
input_schema:
  type: object
  properties:
    operation:
      type: string
      description: "save_incident, save_lesson, search, get, or list"
    id:
      type: string
      description: Incident or lesson identifier for save_incident, save_lesson, and get.
    raw_text:
      type: string
      description: Full unmodified post-mortem text for save_incident.
    distilled_text:
      type: string
      description: Concise lesson text for save_lesson (max 280 chars).
    metadata:
      type: object
      description: Metadata object for save_incident (source, ingested_at, agent).
    tags:
      type: object
      description: Array of tags for save_lesson (incident_id, services, root_cause, confidence).
    query:
      type: string
      description: Natural-language or keyword query for search.
    scope:
      type: string
      description: "incidents, lessons, or all (search only; list does not accept all)"
    limit:
      type: integer
      description: Maximum results for search (cap 50) or records per page for list (cap 500).
    cursor:
      type: string
      description: Opaque pagination cursor for list. Pass null on first call.
  required:
    - operation
output_schema:
  type: object
  properties:
    stored_id:
      type: string
    backend:
      type: string
    results:
      type: object
    record:
      type: object
    records:
      type: object
    next_cursor:
      type: string
