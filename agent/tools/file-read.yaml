name: file-read
version: "0.1.0"
description: >
  Read files from the local filesystem. Supports full-content reads
  (operation: read) and JSON parsing (operation: read_json). Returns raw
  content or parsed object; interpretation is the caller's responsibility.
input_schema:
  type: object
  properties:
    operation:
      type: string
      description: "read — full content as string; read_json — parse and return JSON object"
    path:
      type: string
      description: Absolute or repo-relative file path.
  required:
    - operation
    - path
output_schema:
  type: object
  properties:
    content:
      type: string
    data:
      type: object
    size_bytes:
      type: integer
    exists:
      type: boolean
implementation:
  type: script
  path: scripts/file-read.mjs
  runtime: node
