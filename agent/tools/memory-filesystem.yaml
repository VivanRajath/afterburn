name: memory-filesystem
version: "0.1.0"
description: >
  Filesystem adapter for the memory-backend interface. Always available,
  zero config — stores incidents and lessons as flat JSON files under
  AFTERBURN_FS_ROOT (default: memory/store). Search is keyword-based with
  no semantic ranking. Suitable for local development and small teams.
  Skills and sub-agents never reference this adapter directly.
input_schema:
  type: object
  properties:
    operation:
      type: string
      description: "save_incident, save_lesson, search, get, or list — mirrors memory-backend interface"
    id:
      type: string
      description: Record identifier.
    raw_text:
      type: string
      description: Raw incident text for save_incident.
    distilled_text:
      type: string
      description: Distilled lesson text for save_lesson.
    metadata:
      type: object
      description: Metadata object for save operations.
    tags:
      type: object
      description: Tags array for save_lesson.
    query:
      type: string
      description: Keyword search query.
    scope:
      type: string
      description: "incidents, lessons, or all"
    limit:
      type: integer
      description: Max results.
    cursor:
      type: string
      description: Pagination cursor (last filename seen in lexicographic order).
  required:
    - operation
output_schema:
  type: object
  properties:
    stored_id:
      type: string
    backend:
      type: string
    results:
      type: object
    record:
      type: object
    records:
      type: object
    next_cursor:
      type: string
